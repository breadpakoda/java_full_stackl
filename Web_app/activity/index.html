<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="server.jsp"  method="post">
        <div>
            <div>
                <label>Employee Id</label>
                <input placeholder="Employee Id" name="emp_id" required type="text"></input>
            </div>

            <div >
                <label>Full Name</label>
                <input placeholder="Name" required name="name" type="text"></input>
            </div>

            <div >
                <label>Email</label>
                <input placeholder="email..." name="email" required type="email"></input>
            </div>

            <div >
                <label>Password</label>
                <input placeholder="password" name="password" required type="password"></input>
            </div>

            <div>
                <label>Department</label>
                <select name="dept">
                    <option value="hr">HR</option>
                    <option value="it">IT</option>
                    <option value="sales">Sales</option>
                    <option value="finance">Finance</option>
                </select>

            </div>

            <div>
                <label>Designation</label>
                <select name="desg">
                    <option value="hr">Manager</option>
                    <option value="it">Developer</option>
                    <option value="sales">Analyst</option>
                </select>

            </div>
            <div>
                <label>Salary</label>
                <input placeholder="Salary" name="salary" required type="text"></input>
            </div>

            <div>
                <label>Date</label>
                <input type="date" name="date"></input>
            </div>

            <div>
                <label>Gender</label>
                <select name="gender">
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
                <a href="">Dont have a account</a>

                <button type="submit">Submit</button>
            </div>
        </div>
    </form>
    
</body>
</html>
